<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>济南低价机票</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>&#9992; 济南低价机票</h1>
      <div class="data-info">
        <span>数据日期：<strong id="dataDate">--</strong></span>
        <span class="sep">|</span>
        <span>更新于：<strong id="updateTime">--</strong></span>
        <button class="refresh-btn" id="refreshBtn" title="刷新数据">&#x21bb;</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="domestic">
        国内航班 <span class="count" id="domesticCount">0</span>
      </button>
      <button class="tab" data-tab="international">
        国际/港澳台航班 <span class="count" id="internationalCount">0</span>
      </button>
    </nav>

    <div class="date-filter">
      <label class="date-label">出发日期：</label>
      <button class="date-btn active" id="dateAllBtn">全部日期</button>
      <div class="date-list" id="dateList"></div>
    </div>

    <div class="summary-bar" id="summaryBar">
      共 <strong id="totalCount">0</strong> 个航班低于 &yen;500，最低 <strong id="minPrice">--</strong>
    </div>

    <main id="flightList" class="flight-grid">
      <div class="loading">加载中...</div>
    </main>

    <footer>
      <span>数据来源：去哪儿网 &middot; 仅展示 &le; &yen;500 航班</span>
      <span class="sep">|</span>
      <span>点击航班查看返程 &middot; 运行 <code>python scraper.py</code> 更新数据</span>
    </footer>
  </div>

  <!-- 返程弹窗 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-route">&#9992; <span id="modalDest"></span></div>
          <div class="modal-sub" id="modalSub"></div>
        </div>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <h3 class="return-title">&#x21C5; 返程（未来3天）</h3>
        <div id="modalReturns" class="return-list">
          <div class="loading">加载中...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
